services:
  - type: web
    name: recipe-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recipe-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free

databases:
  - name: recipe-db
    plan: free
    databaseName: recipes_db
    user: recipe_user